# --- ASUS ROG Flow Z13 (2025) Hardware ---
# Platform profile change notification (Fn+F5 / Armory Crate key)
exec-once = ~/.local/bin/rog-profile-notify.sh

# Tablet Input Mapping (Fixed formatting)
input {
    tablet {
        transform = 0
        output = eDP-1
    }
}

# --- Keybinds ---
# Virtual Keyboard (Super + V)
bind = SUPER, V, exec, pkill wvkbd-deskintl || wvkbd-deskintl -L 300

# Power Profile Picker (Super + Q)
bind = SUPER, Q, exec, omarchy-menu power

# ROG TDP Cap Menu (Super + Shift + Q)
bind = SUPER SHIFT, Q, exec, ~/.local/bin/rog-quick.sh

# Screenshot (Super + Shift + S)
bind = SUPER SHIFT, S, exec, omarchy-capture-screenshot

# ROG Control Center (Super + Shift + R)
bind = SUPER SHIFT, R, exec, rog-control-center
